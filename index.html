<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaundryPro Login</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <!--Left section-->
        <div class="left">
            <img src="LaundryPro.png" alt="LaundryPro">
        </div>
        <!--Right section-->
        <div class="right">
            <h1>Hello Again!</h1>
            <p>Login to your LaundryPro account</p>
            
            <form>
                <input type="email" placeholder="Enter your email">
                <input type="password" placeholder="Enter your password">
                <!--Forgot password-->
                <div class="forgot">
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit">Login</button>
                <!--Register-->
                <p class="register">Not a member? <a href="#">Register Now</a></p>
            </form>
        </div>
    </div>
</body>
</html>
